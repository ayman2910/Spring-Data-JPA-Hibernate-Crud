spring.application.name=curdjpa
# 1. Database Connection URL (Targeting port 3306 and the specific database name)
spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker

# 2. Database Credentials (The exact user you just created)
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# 3. Hibernate Configuration (Tells Hibernate to print the SQL it runs behind the scenes)
spring.jpa.show-sql=true
spring.main.banner-mode=off
logging.level.root=warn

#SQL and hibernate
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.com.jdbc.bind=trace
spring.jpa.hibernate.ddl-auto=create
